<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Add Component</title>
    </head>
    <body>
        <h1>Add Component</h1>
        <form id="componentForm">
            <label>
                Project ID:
                <input type="text" name="project_id" required />
            </label>
            <br />
            <label>
                Name:
                <input type="text" name="name" required />
            </label>
            <br />
            <label>
                Description:
                <input type="text" name="desc" />
            </label>
            <br />
            <label>
                Ports (comma seperated):
                <input type="text" name="ports" />
            </label>
            <br />
            <button type="submit">Add Component</button>
        </form>

        <h2>Response</h2>
        <pre id="responseOutput"></pre>

        <script>
            const form = document.getElementById("componentForm");
            const output = document.getElementById("responseOutput");

            form.addEventListener("submit", async (e) => {
                e.preventDefault(); // stop page reload

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                let portsArray = [];
                if (data.ports) {
                    portsArray = data.ports
                        .split(",")
                        .map((p) => p.trim())
                        .filter(Boolean);
                }
                const payload = { ...data, ports: portsArray };

                const token = localStorage.getItem("token");

                try {
                    const res = await fetch(
                        "https://bigstone-api.justparrot.workers.dev/components",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                Authorization: `Bearer ${token}`,
                            },
                            body: JSON.stringify(payload),
                        },
                    );

                    const json = await res.json();

                    // show response
                    output.textContent = JSON.stringify(json, null, 2);

                    // ONLY reset if successful
                    if (res.ok) {
                        form.reset();
                    }
                } catch (err) {
                    output.textContent = "Error: " + err.message;
                }
            });
        </script>
    </body>
</html>
