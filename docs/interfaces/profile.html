<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>User Profile</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
                background: #f7f7f7;
            }
            .profile {
                background: #fff;
                padding: 20px;
                border-radius: 8px;
                max-width: 400px;
                margin: auto;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            }
            .profile h2 {
                margin-top: 0;
            }
            .profile div {
                margin-bottom: 8px;
            }
            button {
                margin-top: 10px;
                padding: 8px 12px;
                border-radius: 5px;
                border: none;
                cursor: pointer;
            }
            button:hover {
                opacity: 0.9;
            }
            .export {
                background-color: #4caf50;
                color: white;
            }
            .delete {
                background-color: #f44336;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="profile" id="profile">
            <h2>User Profile</h2>
            <div><strong>ID:</strong> <span id="userId"></span></div>
            <div><strong>Username:</strong> <span id="username"></span></div>
            <div><strong>Created:</strong> <span id="createdAt"></span></div>
            <div>
                <strong>Components Created:</strong>
                <span id="cmpntCreations"></span>
            </div>

            <button class="export" id="exportBtn">Export Data</button>
            <button class="delete" id="deleteBtn">Delete Account</button>
        </div>

        <script>
            const api_url = "https://bigstone-api.justparrot.workers.dev"; // <-- configurable API base URL

            async function loadProfile() {
                const token = localStorage.getItem("token");
                if (!token) {
                    alert("No token found. Log in first.");
                    return;
                }

                try {
                    const res = await fetch(`${api_url}/users/me`, {
                        headers: { Authorization: "Bearer " + token },
                    });

                    if (!res.ok) throw new Error("Failed to fetch user");
                    const data = await res.json();

                    document.getElementById("userId").textContent =
                        data.id || "N/A";
                    document.getElementById("username").textContent =
                        data.username || "N/A";
                    document.getElementById("createdAt").textContent =
                        new Date(data.created_at).toLocaleString() || "N/A";
                    document.getElementById("cmpntCreations").textContent =
                        data.cmpnt_creations ?? 0;
                } catch (err) {
                    console.error(err);
                    alert("Error loading profile: " + err.message);
                }
            }

            // Export button
            document
                .getElementById("exportBtn")
                .addEventListener("click", async () => {
                    const token = localStorage.getItem("token");
                    if (!token) return;

                    try {
                        const res = await fetch(`${api_url}/users/me/export`, {
                            headers: { Authorization: "Bearer " + token },
                        });
                        if (!res.ok) throw new Error("Failed to fetch export");

                        const data = await res.json();
                        const blob = new Blob([JSON.stringify(data, null, 2)], {
                            type: "application/json",
                        });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement("a");
                        a.href = url;
                        a.download = "user_export.json";
                        a.click();
                        URL.revokeObjectURL(url);
                    } catch (err) {
                        console.error(err);
                        alert("Error exporting data: " + err.message);
                    }
                });

            // Delete button
            document
                .getElementById("deleteBtn")
                .addEventListener("click", async () => {
                    if (
                        !confirm(
                            "Are you sure you want to delete your account? This action is permanent.",
                        )
                    )
                        return;

                    const token = localStorage.getItem("token");
                    if (!token) return;

                    try {
                        const res = await fetch(`${api_url}/users/me`, {
                            method: "DELETE",
                            headers: { Authorization: "Bearer " + token },
                        });
                        if (!res.ok)
                            throw new Error("Failed to delete account");

                        alert("Account deleted successfully");
                        localStorage.removeItem("token");
                        location.reload();
                    } catch (err) {
                        console.error(err);
                        alert("Error deleting account: " + err.message);
                    }
                });

            loadProfile();
        </script>
    </body>
</html>
