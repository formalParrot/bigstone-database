<!doctype html>
<html>
    <head>
        <title>Port Grid</title>
        <style>
            :root {
                --base-size: 16px; /* main cell size */
                --cell-gap: calc(var(--base-size) / 16);
                --line-thick: calc(var(--base-size) / 16);
                --small-border: calc(var(--base-size) / 32);
            }

            body {
                background: #000;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: sans-serif;
                flex-direction: column;
                gap: 10px;
            }

            #grid {
                display: grid;
                grid-template-columns: repeat(16, var(--base-size));
                grid-template-rows: repeat(16, var(--base-size));
                gap: var(--cell-gap);
            }

            .cell {
                width: var(--base-size);
                height: var(--base-size);
                background: #1a1a1a;
                position: relative;
                overflow: hidden;
                border-right: var(--small-border) solid #333;
                border-bottom: var(--small-border) solid #333;
            }

            .cell.line-x {
                border-right: var(--line-thick) solid #666;
            }

            .cell.line-y {
                border-bottom: var(--line-thick) solid #666;
            }

            .cell img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <label>
            Component ID:
            <input type="text" id="componentIdInput" />
        </label>
        <button id="loadComponentBtn">Load</button>

        <div id="grid"></div>

        <script>
            const GRID_SIZE = 16;
            const grid = document.getElementById("grid");
            const cells = [];

            // example port coordinates
            const PORT_COORDS = {
                iBIN: { x: 7, y: 2 },
                oBIN: { x: 10, y: 2 },
                iHEX: { x: 5, y: 2 },
                oHEX: { x: 12, y: 2 },
                "iHEX-STATE": { x: 5, y: 4 },
                "oHEX-STATE": { x: 12, y: 4 },
                "iHEX-2/1": { x: 7, y: 6 },
                "iHEX-2/2": { x: 9, y: 6 },
                "oHEX-2/1": { x: 8, y: 6 },
                "oHEX-2/2": { x: 10, y: 6 },
                "iBIN-LR/1": { x: 3, y: 2 },
                "iBIN-LR/2": { x: 3, y: 4 },
                "oBIN-LR/1": { x: 14, y: 2 },
                "oBIN-LR/2": { x: 14, y: 4 },
            };

            const COLOR_MAP = {
                ibin: "#8B0000",
                obin: "#8B0000",
                ihex: "#0000FF",
                ohex: "#0000FF",
                "ihex-state": "#0B6623",
                "ohex-state": "#0B6623",
                "ihex-2/1": "#e6CC00",
                "ihex-2/2": "#e6CC00",
                "ohex-2/1": "#e6CC00",
                "ohex-2/2": "#e6CC00",
                "ibin-lr/1": "#008b8b",
                "ibin-lr/2": "#008b8b",
                "obin-lr/1": "#008b8b",
                "obin-lr/2": "#008b8b",
            };

            const TEXTURES = {
                i: "textures/input.png",
                o: "textures/output.png",
            };

            // create grid
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");

                    if ((x + 1) % 2 === 0) cell.classList.add("line-x");
                    if ((y + 1) % 2 === 0) cell.classList.add("line-y");

                    if (x === GRID_SIZE - 1) cell.style.borderRight = "none";
                    if (y === GRID_SIZE - 1) cell.style.borderBottom = "none";

                    grid.appendChild(cell);
                    cells.push(cell);
                }
            }

            function getIndex(x, y) {
                const displayY = GRID_SIZE - y;
                const displayX = x - 1;
                return displayY * GRID_SIZE + displayX;
            }

            function renderPorts(portNames) {
                cells.forEach((cell) => {
                    cell.style.background = "#1a1a1a";
                    cell.querySelector("img")?.remove();
                });

                portNames.forEach((name) => {
                    const coords = PORT_COORDS[name];
                    if (!coords) return;

                    const x = coords.x;
                    const y = coords.y;

                    const typeKey = name.toLowerCase();
                    const color = COLOR_MAP[typeKey] || "#888";

                    const textureKey = name[0].toLowerCase();
                    const texture = TEXTURES[textureKey];

                    const idx = getIndex(x, y);
                    const cell = cells[idx];
                    if (cell) {
                        const img = document.createElement("img");
                        img.src = texture;
                        img.onerror = () => img.remove();
                        cell.appendChild(img);
                    }

                    const belowY = y - 1;
                    if (belowY >= 1) {
                        const belowIdx = getIndex(x, belowY);
                        const belowCell = cells[belowIdx];
                        if (belowCell) belowCell.style.background = color;
                    }
                });
            }

            document
                .getElementById("loadComponentBtn")
                .addEventListener("click", () => {
                    const id = document
                        .getElementById("componentIdInput")
                        .value.trim();
                    if (!id) return;
                    // fake fetch for example, just render all ports
                    renderPorts(Object.keys(PORT_COORDS));
                });
        </script>
    </body>
</html>
